<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>DentMatch — ปิดปรับปรุงระบบ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@500;600;700;800&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --p950:#2A1A5E;--p800:#372080;--p700:#4A2FA8;--p500:#7C5CBF;--p400:#9B7FD4;
    --gold:#E8C86A;--gold2:#F0D98A;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Sarabun',sans-serif;
    background:linear-gradient(145deg,var(--p950) 0%,var(--p700) 55%,var(--p400) 100%);
    color:#fff;min-height:100%;
    display:flex;align-items:center;justify-content:center;
    padding:24px;text-align:center;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:440px;width:100%}
  .logo{font-family:'Prompt',sans-serif;font-size:32px;font-weight:800;letter-spacing:-.8px;text-shadow:0 2px 16px rgba(232,200,106,.3)}
  .logo span{color:var(--gold)}
  .badge{
    display:inline-block;margin-top:14px;
    font-family:'Prompt',sans-serif;font-size:11px;font-weight:700;letter-spacing:.8px;
    color:var(--gold2);background:rgba(232,200,106,.16);
    border:1px solid rgba(232,200,106,.45);border-radius:8px;padding:5px 12px;
  }
  .icon{
    width:88px;height:88px;margin:34px auto 26px;
    border-radius:24px;display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);
    box-shadow:0 10px 40px rgba(0,0,0,.18);
    animation:float 3.2s ease-in-out infinite;
  }
  .icon svg{width:44px;height:44px;stroke:var(--gold2);animation:spin 9s linear infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  h1{font-family:'Prompt',sans-serif;font-size:25px;font-weight:700;line-height:1.3;margin-bottom:14px}
  p{font-size:15.5px;line-height:1.7;color:rgba(255,255,255,.82);font-weight:400}
  .foot{margin-top:38px;font-size:12.5px;color:rgba(255,255,255,.5)}
  @media (prefers-reduced-motion:reduce){.icon,.icon svg{animation:none}}
</style>
</head>
<body>
  <main class="wrap">
    <div class="logo">Dent<span>Match</span></div>
    <div class="badge">ปิดปรับปรุงระบบ</div>

    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>

    <h1>ขออภัย เรากำลังปรับปรุงระบบ</h1>
    <p>DentMatch ปิดชั่วคราวเพื่อพัฒนาให้ดียิ่งขึ้น<br>อีกสักครู่จะกลับมาให้บริการตามปกติ 🙏</p>

    <div class="foot">© DentMatch</div>
  </main>
</body>
</html>
